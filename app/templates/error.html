<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Wikipanime</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/error.css') }}">
</head>
<body>
    <div id="troll-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; justify-content: center; align-items: center;">
        <video id="troll-video" autoplay style="border-radius: 20px; max-width: 80%;">
            <source src="{{ url_for('static', filename='videos/nihahahaha.mp4') }}" type="video/mp4">
            Your website does not support videos.
        </video>
    </div>

    <div class="glass-container error-box">
        <h2>Error</h2>
        <p>{{ error_message }}</p>
        
        <div class="btn-group">
            <button onclick="history.back()" class="btn-error">Try again</button>
            <a href="{{ url_for('home') }}" class="btn-home">Back To Menu</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var video = document.getElementById('troll-video');
            var modal = document.getElementById('troll-modal');
            
            video.onended = function() {
                modal.style.display = 'none';
            };

            modal.onclick = function() {
                modal.style.display = 'none';
                video.pause();
            };
        });
    </script>
</body>
</html>
